<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CAPA Dashboard</title>
  <style>
    :root { color-scheme: dark; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #101114; color: #f5f5f5; }
    body { margin: 0; background: #101114; }
    header { padding: 24px 32px; border-bottom: 1px solid #2b2d33; }
    main { padding: 24px 32px; display: grid; gap: 20px; }
    h1, h2, h3 { margin: 0; }
    label { display: grid; gap: 6px; color: #d8dbe2; font-size: 13px; }
    input, select, textarea { width: 100%; box-sizing: border-box; border: 1px solid #3a3d46; background: #0f1117; color: #f5f5f5; border-radius: 9px; padding: 9px 10px; }
    textarea { min-height: 70px; resize: vertical; }
    .muted { color: #a8adb8; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 16px; }
    .card { background: #17191f; border: 1px solid #2b2d33; border-radius: 14px; padding: 18px; }
    .stack { display: grid; gap: 12px; }
    .metric { font-size: 32px; font-weight: 800; margin-top: 8px; }
    .item { border-top: 1px solid #2b2d33; padding: 12px 0; }
    .item:first-child { border-top: 0; }
    .pill { display: inline-block; border: 1px solid #3a3d46; border-radius: 999px; padding: 3px 9px; font-size: 12px; color: #d8dbe2; }
    button { border: 1px solid #3a3d46; background: #20232b; color: #f5f5f5; border-radius: 10px; padding: 10px 14px; cursor: pointer; }
    button:hover { background: #2a2e38; }
    pre { white-space: pre-wrap; word-break: break-word; background: #0c0d10; border-radius: 10px; padding: 12px; color: #d8dbe2; }
  </style>
</head>
<body>
  <header>
    <h1>CAPA Dashboard</h1>
    <p class="muted">Backlog, avance y acciones desde la API local DB-first.</p>
  </header>

  <main>
    <section class="grid">
      <article class="card"><h2>PBI activo</h2><div id="active" class="muted">Cargando...</div></article>
      <article class="card"><h2>Backlog</h2><div class="metric" id="backlog-count">0</div><p class="muted">PBIs activos o pendientes</p></article>
      <article class="card stack"><h2>Acciones rápidas</h2><button id="refresh">Actualizar</button><button id="next">Siguiente paso</button><button id="close-pbi">Cerrar PBI</button><button id="close-sprint">Cerrar sprint</button><div id="status" class="muted"></div></article>
    </section>

    <section class="grid">
      <article class="card"><h2>Backlog</h2><div id="backlog"></div></article>
      <article class="card"><h2>Detalle del PBI activo</h2><div id="detail" class="muted">Sin detalle todavía.</div></article>
    </section>

    <section class="grid">
      <form id="evidence-form" class="card stack"><h2>Agregar evidencia</h2><label>Claim <textarea name="claim" required></textarea></label><label>Clasificación <select name="classification"><option>VERIFIED</option><option>PARTIAL</option><option>ASSUMPTION</option><option>UNKNOWN</option></select></label><label>Tipo <input name="type" /></label><label>Comando <input name="command" /></label><label>Resultado <input name="result" /></label><button type="submit">Guardar evidencia</button></form>
      <form id="test-form" class="card stack"><h2>Registrar test</h2><label>Tipo <input name="type" /></label><label>Comando <input name="command" /></label><label>Status <select name="status"><option>ok</option><option>failed</option><option>unknown</option></select></label><label>Resumen <input name="summary" /></label><button type="submit">Guardar test</button></form>
      <form id="review-form" class="card stack"><h2>Registrar review</h2><label>Status <select name="status"><option>ok</option><option>changes_requested</option><option>unknown</option></select></label><label>Riesgo <select name="risk"><option>low</option><option>medium</option><option>high</option></select></label><label>Resumen <textarea name="summary"></textarea></label><label>Hallazgos <textarea name="findings"></textarea></label><button type="submit">Guardar review</button></form>
      <form id="finding-form" class="card stack"><h2>Registrar finding</h2><label>Título <input name="title" required /></label><label>Descripción <textarea name="description"></textarea></label><label>Acción <input name="action" value="record" /></label><label><span><input type="checkbox" name="outside" /> Fuera del PBI actual</span></label><button type="submit">Guardar finding</button></form>
    </section>

    <section class="card"><h2>Estado API</h2><pre id="raw">{}</pre></section>
  </main>
  <script src="/app.js"></script>
</body>
</html>
