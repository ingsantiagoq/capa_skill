name: CAPA Smoke

on:
  pull_request:
  push:
    branches: [main]

jobs:
  smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run DB-first smoke test
        run: npm run test:db

      - name: Run CAPA guard smoke test
        run: npm run test:guard

      - name: Run Claude hook smoke test
        run: node test/smoke-hook.js

      - name: Run CAPA scope smoke test
        run: npm run test:scope
